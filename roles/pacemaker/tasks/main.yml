---
- name: Install pacemaker and cmrsh
  ansible.builtin.apt:
    name: [pacemaker, crmsh]
    state: present

- name: Create ssh directory
  ansible.builtin.file:
    path: /root/.ssh
    owner: root
    group: root
    mode: u=rwx,g=rw,o=
    state: directory

- name: Generate an OpenSSH keypair
  community.crypto.openssh_keypair:
    path: /root/.ssh/id_ed25519
    type: ed25519
    comment: Generated by ansible for pacemaker

- name: Fetch OpenSSH publickey into memory
  ansible.builtin.slurp:
    src: /root/.ssh/id_ed25519.pub
  register: openssh_pubkey

- name: Exchange OpenSSH keys within the cluster members
  ansible.posix.authorized_key:
    user: root
    key: "{{ hostvars[item].openssh_pubkey.content | b64decode }}"
    state: present
  loop: "{{ groups['cluster'] }}"

- name: Allow application to bind non-local IP addresses
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: net.ipv4.ip_nonlocal_bind, value: '1' }
    - { name: net.ipv6.ip_nonlocal_bind, value: '1' }

- name: Get pacemaker current configuration
  ansible.builtin.command:
    cmd: crm configure show
  register: pacemaker_conf
  changed_when: no
  run_once: yes

- name: Disable fencing/sonith
  ansible.builtin.command:
    cmd: crm configure property stonith-enabled=false
  when: "'stonith-enabled=false' not in pacemaker_conf.stdout"
  run_once: yes

- name: Configure IPv4 vip
  ansible.builtin.command:
    cmd: crm configure primitive virtual_IP4 ocf:heartbeat:IPaddr2 params ip={{ pacemaker_default_ipv4_vip }} cidr_netmask={{ pacemaker_default_ipv4_cidr_vip }} nic="enp1s0" op monitor interval="10s"
  when: "'primitive virtual_IP4' not in pacemaker_conf.stdout"
  run_once: yes

- name: Configure IPv6 vip
  ansible.builtin.command:
    cmd: crm configure primitive virtual_IP6 ocf:heartbeat:IPaddr2 params ip={{ pacemaker_default_ipv6_vip }} cidr_netmask={{ pacemaker_default_ipv6_cidr_vip }} nic="enp1s0" op monitor interval="10s"
  when: "'primitive virtual_IP6' not in pacemaker_conf.stdout"
  run_once: yes

- name: Configure vips colocation
  ansible.builtin.command:
    cmd: "crm configure colocation virtual_IP46 inf: virtual_IP4 virtual_IP6"
  when: "'colocation virtual_IP46 inf: virtual_IP4 virtual_IP6' not in pacemaker_conf.stdout"
  run_once: yes

- name: conf nginx
  ansible.builtin.import_tasks: nginx.yml
