---

- name: Configure nginx resource HA
  ansible.builtin.command:
    cmd: crm configure primitive nginxHA nginx op monitor interval=10s
  when: "'primitive nginxHA nginx' not in pacemaker_conf.stdout"
  run_once: yes

- name: Configure nginx colocation with VIPs
  ansible.builtin.command:
    cmd: "crm configure colocation nginx_VIP inf: nginx_HA virtual_IP4 virtual_IP6"
  when: "'colocation nginx_VIP inf: nginx_HA virtual_IP4 virtual_IP6' not in pacemaker_conf.stdout"
  run_once: yes